#:schema node_modules/wrangler/config-schema.json
name = "tepak-id"
main = "./dist/_worker.js/index.js"
compatibility_date = "2025-04-22"
compatibility_flags = ["nodejs_compat"]

[env.production]
vars = { 
  # Set via Cloudflare Workers dashboard or environment
  # PUBLIC_SUPABASE_URL = "https://your-project.supabase.co",
  # PUBLIC_SUPABASE_ANON_KEY = "your-anon-key",
  # PUBLIC_DUITKU_MERCHANT_CODE = "your-merchant-code",
  DUITKU_ENVIRONMENT = "production",
  DUITKU_CALLBACK_URL = "https://yourdomain.com/api/payments/duitku/webhook",
  DUITKU_DISBURSEMENT_CALLBACK_URL = "https://yourdomain.com/api/webhooks/duitku-disbursement"
}

[env.development]
vars = { 
  # Load from .env file in development
  DUITKU_ENVIRONMENT = "sandbox",
  DUITKU_CALLBACK_URL = "http://localhost:4321/api/payments/duitku/webhook",
  DUITKU_DISBURSEMENT_CALLBACK_URL = "http://localhost:4321/api/webhooks/duitku-disbursement"
}

[vars]
# All configuration must be set via environment variables
# See .env.example for required variables

[[kv_namespaces]]
# binding = "MY_KV_NAMESPACE"
# id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# [site]
# bucket = "./dist"

[observability]
enabled = true
